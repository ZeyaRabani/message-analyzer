services:
  - type: worker
    name: message-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUR_USER_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.10
